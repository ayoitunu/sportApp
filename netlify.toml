[build]
  base = "."
  command = "pnpm turbo run build --filter=@sport-fan/web..."
  publish = "apps/web/.next"
  # Only rebuild when web app or its shared dependencies change
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/web/ packages/ supabase/"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.9"

[[plugins]]
  package = "@netlify/plugin-nextjs"
